services:
  db:
    image: postgres:15-alpine
    container_name: payverify_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-payverify}
      POSTGRES_USER: ${POSTGRES_USER:-payverify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payverify123}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payverify} -d ${POSTGRES_DB:-payverify}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [ payverify_net ]

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payverify_web_prod
    restart: unless-stopped
    env_file:
      - env.simple
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-payverify}
      - POSTGRES_USER=${POSTGRES_USER:-payverify}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-payverify123}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - USE_POSTGRES=True
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - DEBUG=${DEBUG:-False}
      - PAYVERIFY_TERMINAL_TIMEOUT=${PAYVERIFY_TERMINAL_TIMEOUT:-30}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      python manage.py shell -c \"
      from django.contrib.auth import get_user_model
      User = get_user_model()
      if not User.objects.filter(username='admin').exists():
          User.objects.create_superuser('admin', 'admin@example.com', 'admin123')
          print('Superuser created: admin/admin123')
      else:
          print('Superuser already exists')
      \" &&
      gunicorn controller.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
      "
    expose:
      - "8000"
    volumes:
      - ./staticfiles:/app/staticfiles
      - media_volume_prod:/app/media
    networks: [ payverify_net ]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: payverify_nginx_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./staticfiles:/var/www/static:ro
      - media_volume_prod:/var/www/media:ro
    depends_on:
      web:
        condition: service_healthy
    networks: [ payverify_net ]

volumes:
  pgdata_prod:
  media_volume_prod:

networks:
  payverify_net:
    driver: bridge