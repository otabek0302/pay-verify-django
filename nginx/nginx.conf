upstream web {
    server web:8000;
}

server {
    listen 80;

    # health
    location /ping {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location /static/ {
        alias /var/www/static/;
    }
    
    location /media/ {
        alias /var/www/media/;
    }

    location / {
        proxy_set_header Host 192.168.100.145;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://web;
        proxy_redirect off;
    }
}