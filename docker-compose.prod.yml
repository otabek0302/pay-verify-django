version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: payverify_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-payverify}
      POSTGRES_USER: ${POSTGRES_USER:-payverify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payverify}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payverify -d payverify"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [ payverify_net ]

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payverify_web_prod
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-payverify}
      - POSTGRES_USER=${POSTGRES_USER:-payverify}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-payverify}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - USE_POSTGRES=True
      - SECRET_KEY=${SECRET_KEY:-django-insecure-hbyaqg!x@ykw_pb7!cwil4_&39itz+w)wc3-9e7pgmoyd$=(c_}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=192.168.100.133,192.168.1.108,192.168.1.100,localhost,127.0.0.1,0.0.0.0,*
      - PAYVERIFY_TERMINAL_TIMEOUT=${PAYVERIFY_TERMINAL_TIMEOUT:-5}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      python create_superuser.py &&
      gunicorn controller.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
      "
    expose:
      - "8000"
    volumes:
      - static_volume_prod:/app/static
      - media_volume_prod:/app/media
    networks: [ payverify_net ]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: payverify_nginx_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8000:80"  # Allow access via port 8000 for terminal compatibility
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_volume_prod:/var/www/static:ro
      - media_volume_prod:/var/www/media:ro
    depends_on:
      web:
        condition: service_healthy
    networks: [ payverify_net ]

volumes:
  pgdata_prod:
  static_volume_prod:
  media_volume_prod:

networks:
  payverify_net:
    driver: bridge
